version: '3.9'

services:
  ai-agent:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL=${MODEL:-claude-opus-4-7}
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - CHROMADB_PATH=/app/data/chromadb
      - DEBUG=${DEBUG:-false}
    volumes:
      - agent_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  agent_data:
