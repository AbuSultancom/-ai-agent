version: '3.8'

services:
  ai-agent:
    image: ai-agent:latest
    ports:
      - '5000:5000'
    environment:
      - AI_AGENT_ENV=production
    networks:
      - ai-network

  ollama:
    image: ollama:latest
    ports:
      - '8080:8080'
    environment:
      - OLLAMA_ENV=production
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
