{% extends "store/base.html" %}
{% block title %}Product — MyStore{% endblock %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <!-- breadcrumb -->
  <nav class="text-xs text-gray-400 mb-6 flex gap-2">
    <a href="/store" class="hover:text-indigo-600" data-i18n="home"></a>
    <span>/</span>
    <a href="/store/products" class="hover:text-indigo-600" data-i18n="products"></a>
    <span>/</span>
    <span id="breadcrumb-name" class="text-gray-600"></span>
  </nav>

  <div id="product-detail" class="grid grid-cols-1 md:grid-cols-2 gap-10">
    <!-- skeleton -->
    <div class="aspect-square bg-gray-100 rounded-2xl animate-pulse"></div>
    <div class="space-y-4">
      <div class="h-8 bg-gray-100 rounded-xl animate-pulse w-3/4"></div>
      <div class="h-6 bg-gray-100 rounded-xl animate-pulse w-1/3"></div>
      <div class="h-20 bg-gray-100 rounded-xl animate-pulse"></div>
    </div>
  </div>

  <!-- Related -->
  <div class="mt-16">
    <h2 class="text-xl font-bold text-gray-900 mb-6" data-i18n="related"></h2>
    <div id="related-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const productId = "{{ product_id }}";

document.addEventListener("DOMContentLoaded", async () => {
  try {
    const r = await window.store.fetchProduct(productId);
    if (!r.success) throw new Error(r.error);
    const p = r.data;

    document.getElementById("breadcrumb-name").textContent = p.name;

    document.getElementById("product-detail").innerHTML = `
      <div class="rounded-2xl overflow-hidden bg-gray-50 flex items-center justify-center aspect-square">
        ${p.image_url
          ? `<img src="${p.image_url}" class="w-full h-full object-cover" alt="${p.name}">`
          : `<div class="text-gray-200"><svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>`
        }
      </div>
      <div class="flex flex-col">
        <div class="flex items-center gap-2 mb-2">${window.store.sourceBadge(p.source || "local")}</div>
        <h1 class="text-2xl font-extrabold text-gray-900 mb-2">${p.name}</h1>
        <p class="text-3xl font-bold text-indigo-600 mb-4">${window.store.formatPrice(p.price)}</p>
        <div class="flex items-center gap-2 mb-4">
          ${p.stock > 0
            ? `<span class="text-xs bg-green-100 text-green-700 font-semibold px-2 py-0.5 rounded-full">${window.store.t("in_stock")}</span>
               <span class="text-xs text-gray-400">${p.stock} ${window.store.t("stock_left")}</span>`
            : `<span class="text-xs bg-red-100 text-red-700 font-semibold px-2 py-0.5 rounded-full">${window.store.t("out_of_stock")}</span>`
          }
        </div>
        ${p.description ? `<div class="mb-6"><h3 class="font-semibold text-gray-700 mb-2" data-i18n="description"></h3><p class="text-sm text-gray-600 leading-relaxed">${p.description}</p></div>` : ""}
        ${p.stock > 0
          ? `<button onclick='window.store.addToCart(${JSON.stringify({...p, source: p.source||"local", source_id: p.id})})'
               class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors text-base" data-i18n="add_to_cart"></button>`
          : `<button disabled class="w-full bg-gray-200 text-gray-500 font-bold py-3.5 rounded-xl cursor-not-allowed" data-i18n="out_of_stock"></button>`
        }
      </div>`;

    // re-apply i18n after injecting HTML
    window.store.applyLang();

    // related
    const relatedGrid = document.getElementById("related-grid");
    if (p.related && p.related.length > 0) {
      relatedGrid.innerHTML = p.related.map(r => window.store.productCard(r)).join("");
    } else {
      relatedGrid.closest("div").style.display = "none";
    }
  } catch(e) {
    document.getElementById("product-detail").innerHTML = `<div class="col-span-2 text-center text-red-400 py-12">${window.store.t("error_loading")}</div>`;
  }
});
</script>
{% endblock %}
