{% extends "store/base.html" %}
{% block title %}MyStore — Home{% endblock %}

{% block content %}

<!-- ── Hero ──────────────────────────────────────────────────────────────── -->
<section class="relative bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-800 text-white overflow-hidden">
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-10 left-10 w-72 h-72 bg-white rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-300 rounded-full blur-3xl"></div>
  </div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 md:py-28 flex flex-col md:flex-row items-center gap-10">
    <div class="flex-1 text-center md:text-start">
      <div id="sources-pills" class="flex flex-wrap gap-2 mb-6 justify-center md:justify-start"></div>
      <h1 class="text-4xl md:text-5xl font-extrabold leading-tight mb-4" data-i18n="hero_title"></h1>
      <p class="text-lg text-indigo-200 mb-8 max-w-lg" data-i18n="hero_sub"></p>
      <a href="/store/products"
        class="inline-block bg-white text-indigo-700 font-bold px-8 py-3 rounded-xl hover:bg-indigo-50 transition-colors shadow-lg"
        data-i18n="shop_now"></a>
    </div>
    <div class="flex-1 flex justify-center">
      <div class="grid grid-cols-2 gap-3 w-72 opacity-90">
        <div class="bg-white/20 rounded-2xl p-4 aspect-square flex items-center justify-center">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <div class="bg-white/20 rounded-2xl p-4 aspect-square flex items-center justify-center mt-4">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="bg-white/20 rounded-2xl p-4 aspect-square flex items-center justify-center">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4"/>
          </svg>
        </div>
        <div class="bg-white/20 rounded-2xl p-4 aspect-square flex items-center justify-center mt-4">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ── Stats bar ──────────────────────────────────────────────────────────── -->
<div class="bg-white border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    <div id="stats-bar" class="flex flex-wrap gap-6 justify-center text-sm text-gray-500"></div>
  </div>
</div>

<!-- ── Featured products ──────────────────────────────────────────────────── -->
<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-gray-900" data-i18n="featured"></h2>
    <a href="/store/products" class="text-sm text-indigo-600 font-medium hover:underline" data-i18n="all_products"></a>
  </div>
  <div id="featured-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <!-- skeleton -->
    <div class="bg-gray-100 rounded-2xl h-64 animate-pulse"></div>
    <div class="bg-gray-100 rounded-2xl h-64 animate-pulse"></div>
    <div class="bg-gray-100 rounded-2xl h-64 animate-pulse"></div>
    <div class="bg-gray-100 rounded-2xl h-64 animate-pulse"></div>
  </div>
</section>

<!-- ── Connected stores ───────────────────────────────────────────────────── -->
<section class="bg-white py-12 border-t border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="text-2xl font-bold text-gray-900 mb-2" data-i18n="sources_title"></h2>
    <p class="text-gray-500 text-sm mb-8" data-i18n="powered_by"></p>
    <div id="store-logos" class="flex flex-wrap justify-center gap-6"></div>
  </div>
</section>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", async () => {
  // sources pills in hero
  try {
    const r = await fetch("/api/store/sources");
    const d = await r.json();
    const pills = document.getElementById("sources-pills");
    const logos = document.getElementById("store-logos");
    const colors = { shopify:"bg-green-500", salla:"bg-orange-500", zid:"bg-purple-500", local:"bg-blue-500" };
    const labels = { shopify:"Shopify", salla:"سلة Salla", zid:"زد Zid", local:"Local" };
    (d.data || []).forEach(s => {
      if (pills) pills.innerHTML += `<span class="text-xs font-semibold px-3 py-1 rounded-full bg-white/20 text-white">${labels[s]||s}</span>`;
      if (logos) logos.innerHTML += `
        <div class="flex flex-col items-center gap-2 p-6 rounded-2xl border border-gray-100 shadow-sm w-40">
          <div class="w-12 h-12 rounded-xl ${colors[s]||"bg-gray-400"} flex items-center justify-center text-white font-bold text-lg">
            ${(labels[s]||s)[0].toUpperCase()}
          </div>
          <span class="text-sm font-semibold text-gray-700">${labels[s]||s}</span>
          <span class="text-xs text-green-500 font-medium">● Connected</span>
        </div>`;
    });
  } catch(e) {}

  // stats bar
  try {
    const r = await fetch("/api/store/summary");
    const d = await r.json();
    const bar = document.getElementById("stats-bar");
    let total_products = 0, total_orders = 0;
    Object.values(d.data?.sources || {}).forEach(s => {
      if (s.products) total_products += s.products;
      if (s.orders) total_orders += s.orders;
    });
    bar.innerHTML = `
      <span>🛍️ ${total_products} ${window.store.t("items")}</span>
      <span>📦 ${total_orders} ${window.store.lang==="ar"?"طلب":"orders"}</span>
      <span>✅ ${window.store.t("free_shipping_note")}</span>`;
  } catch(e) {}

  // featured products
  try {
    const r = await window.store.fetchProducts({ limit: 8 });
    const grid = document.getElementById("featured-grid");
    const products = r.data || [];
    if (products.length === 0) {
      grid.innerHTML = `<div class="col-span-4 text-center text-gray-400 py-12">${window.store.t("no_products")}</div>`;
    } else {
      grid.innerHTML = products.map(p => window.store.productCard(p)).join("");
    }
  } catch(e) {
    document.getElementById("featured-grid").innerHTML = `<div class="col-span-4 text-center text-red-400 py-8">${window.store.t("error_loading")}</div>`;
  }
});
</script>
{% endblock %}
