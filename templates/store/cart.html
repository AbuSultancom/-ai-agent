{% extends "store/base.html" %}
{% block title %}Cart — MyStore{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="text-2xl font-bold text-gray-900 mb-8" data-i18n="your_cart"></h1>

  <div id="empty-cart" class="hidden text-center py-20">
    <div class="text-7xl mb-4">🛒</div>
    <p class="text-gray-500 mb-6" data-i18n="empty_cart"></p>
    <a href="/store/products" class="inline-block bg-indigo-600 text-white font-semibold px-8 py-3 rounded-xl hover:bg-indigo-700 transition-colors" data-i18n="continue_shopping"></a>
  </div>

  <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Items -->
    <div class="lg:col-span-2">
      <div id="cart-items" class="space-y-4"></div>
      <p class="text-xs text-green-600 mt-4 text-center" data-i18n="free_shipping_note"></p>
    </div>

    <!-- Summary -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-20">
        <h2 class="font-bold text-gray-800 mb-4" data-i18n="order_summary"></h2>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between">
            <span class="text-gray-500" data-i18n="subtotal"></span>
            <span id="summary-subtotal" class="font-medium">—</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500" data-i18n="tax"></span>
            <span id="summary-tax" class="font-medium">—</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500" data-i18n="shipping"></span>
            <span class="text-green-600 font-medium" data-i18n="free_shipping"></span>
          </div>
          <div class="border-t pt-3 flex justify-between font-bold text-base">
            <span data-i18n="total"></span>
            <span id="summary-total" class="text-indigo-600">—</span>
          </div>
        </div>
        <a href="/store/checkout"
          class="block mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-center font-semibold py-3 rounded-xl transition-colors"
          data-i18n="proceed_checkout"></a>
        <a href="/store/products"
          class="block mt-3 w-full text-center text-sm text-indigo-500 hover:text-indigo-700"
          data-i18n="continue_shopping"></a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function renderCart() {
  const cart = window.store.cart;
  const emptyEl = document.getElementById("empty-cart");
  const contentEl = document.getElementById("cart-content");

  if (cart.length === 0) {
    emptyEl.classList.remove("hidden");
    contentEl.classList.add("hidden");
    return;
  }
  emptyEl.classList.add("hidden");
  contentEl.classList.remove("hidden");

  const itemsEl = document.getElementById("cart-items");
  itemsEl.innerHTML = cart.map((item, i) => `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex gap-4">
      ${item.image_url
        ? `<img src="${item.image_url}" class="w-20 h-20 rounded-xl object-cover shrink-0">`
        : `<div class="w-20 h-20 rounded-xl bg-gray-100 shrink-0 flex items-center justify-center text-gray-300"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>`
      }
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <div>
            <p class="font-semibold text-sm text-gray-800 line-clamp-2">${item.name}</p>
            <div class="mt-1">${window.store.sourceBadge(item.source)}</div>
          </div>
          <button onclick="window.store.removeFromCart(${i}); renderCart();"
            class="text-gray-400 hover:text-red-500 transition-colors shrink-0 p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="flex items-center justify-between mt-3">
          <div class="flex items-center gap-2 border border-gray-200 rounded-lg overflow-hidden">
            <button onclick="window.store.updateQty(${i}, ${item.quantity-1}); renderCart();" class="px-2.5 py-1 text-gray-600 hover:bg-gray-100">−</button>
            <span class="w-8 text-center text-sm font-medium">${item.quantity}</span>
            <button onclick="window.store.updateQty(${i}, ${item.quantity+1}); renderCart();" class="px-2.5 py-1 text-gray-600 hover:bg-gray-100">+</button>
          </div>
          <span class="font-bold text-indigo-600">${window.store.formatPrice(item.price * item.quantity)}</span>
        </div>
      </div>
    </div>`).join("");

  const subtotal = window.store.cartTotal;
  const tax = subtotal * 0.15;
  const total = subtotal + tax;
  document.getElementById("summary-subtotal").textContent = window.store.formatPrice(subtotal);
  document.getElementById("summary-tax").textContent = window.store.formatPrice(tax);
  document.getElementById("summary-total").textContent = window.store.formatPrice(total);
}
document.addEventListener("DOMContentLoaded", renderCart);
</script>
{% endblock %}
