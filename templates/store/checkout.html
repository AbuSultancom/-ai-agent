{% extends "store/base.html" %}
{% block title %}Checkout — MyStore{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="text-2xl font-bold text-gray-900 mb-8" data-i18n="checkout_title"></h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- ── Customer form ─────────────────────────────────────────────────── -->
    <div class="space-y-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="font-bold text-gray-800 mb-5" data-i18n="customer_info"></h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="full_name"></label>
            <input id="c-name" type="text" data-i18n="full_name"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="email"></label>
            <input id="c-email" type="email" data-i18n="email"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="phone"></label>
            <input id="c-phone" type="tel" data-i18n="phone"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="font-bold text-gray-800 mb-5" data-i18n="shipping_address"></h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="address"></label>
            <input id="c-address" type="text" data-i18n="address"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="city"></label>
              <input id="c-city" type="text" data-i18n="city"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="country"></label>
              <input id="c-country" type="text" value="Saudi Arabia"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1" data-i18n="order_notes"></label>
            <textarea id="c-notes" rows="2" data-i18n="order_notes"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Order summary ─────────────────────────────────────────────────── -->
    <div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="font-bold text-gray-800 mb-4" data-i18n="order_summary"></h2>
        <div id="checkout-items" class="space-y-3 mb-5 max-h-64 overflow-y-auto"></div>
        <div class="border-t pt-4 space-y-2 text-sm">
          <div class="flex justify-between">
            <span class="text-gray-500" data-i18n="subtotal"></span>
            <span id="ch-subtotal">—</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500" data-i18n="tax"></span>
            <span id="ch-tax">—</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500" data-i18n="shipping"></span>
            <span class="text-green-600" data-i18n="free_shipping"></span>
          </div>
          <div class="border-t pt-2 flex justify-between font-bold text-base">
            <span data-i18n="total"></span>
            <span id="ch-total" class="text-indigo-600">—</span>
          </div>
        </div>
        <div id="error-msg" class="hidden mt-3 p-3 bg-red-50 text-red-600 text-sm rounded-xl"></div>
        <button id="place-order-btn" onclick="placeOrder()"
          class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors"
          data-i18n="place_order"></button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function renderCheckoutSummary() {
  const cart = window.store.cart;
  const itemsEl = document.getElementById("checkout-items");
  itemsEl.innerHTML = cart.map(item => `
    <div class="flex items-center gap-3">
      ${item.image_url ? `<img src="${item.image_url}" class="w-12 h-12 rounded-lg object-cover shrink-0">` : `<div class="w-12 h-12 rounded-lg bg-gray-100 shrink-0"></div>`}
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 line-clamp-1">${item.name}</p>
        <p class="text-xs text-gray-400">× ${item.quantity}</p>
      </div>
      <span class="text-sm font-semibold text-indigo-600 shrink-0">${window.store.formatPrice(item.price * item.quantity)}</span>
    </div>`).join("");

  const subtotal = window.store.cartTotal;
  const tax = subtotal * 0.15;
  const total = subtotal + tax;
  document.getElementById("ch-subtotal").textContent = window.store.formatPrice(subtotal);
  document.getElementById("ch-tax").textContent = window.store.formatPrice(tax);
  document.getElementById("ch-total").textContent = window.store.formatPrice(total);
}

async function placeOrder() {
  const name    = document.getElementById("c-name").value.trim();
  const email   = document.getElementById("c-email").value.trim();
  const phone   = document.getElementById("c-phone").value.trim();
  const address = document.getElementById("c-address").value.trim();
  const city    = document.getElementById("c-city").value.trim();
  const country = document.getElementById("c-country").value.trim();
  const notes   = document.getElementById("c-notes").value.trim();
  const errEl   = document.getElementById("error-msg");
  const btn     = document.getElementById("place-order-btn");
  errEl.classList.add("hidden");

  if (!name || !email || !address) {
    errEl.textContent = window.store.lang === "ar" ? "يرجى ملء الحقول المطلوبة: الاسم، البريد، العنوان" : "Please fill required fields: name, email, address";
    errEl.classList.remove("hidden");
    return;
  }

  const items = window.store.cart.map(i => ({
    product_id: i.source_id || i.id,
    name: i.name,
    quantity: i.quantity,
    price: i.price,
  }));

  btn.textContent = window.store.t("processing");
  btn.disabled = true;

  try {
    const result = await window.store.placeOrder({
      customer: { name, email, phone },
      shipping_address: `${address}, ${city}, ${country}`,
      notes,
      items,
    });

    if (result.success) {
      window.store.clearCart();
      window.location.href = `/store/order-success?order=${result.data.order_number}`;
    } else {
      errEl.textContent = result.error || "Error placing order";
      errEl.classList.remove("hidden");
      btn.textContent = window.store.t("place_order");
      btn.disabled = false;
    }
  } catch(e) {
    errEl.textContent = "Network error. Please try again.";
    errEl.classList.remove("hidden");
    btn.textContent = window.store.t("place_order");
    btn.disabled = false;
  }
}

document.addEventListener("DOMContentLoaded", renderCheckoutSummary);
</script>
{% endblock %}
