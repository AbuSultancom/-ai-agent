<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>
<div class="chat-app">

  <header class="chat-header">
    <div class="chat-brand">🤖 AI Agent</div>
    <div class="chat-header-right">
      <button class="icon-btn" id="new-chat-btn" title="New chat">✏️</button>
      <button class="icon-btn" id="history-btn" title="Chat history">🕐</button>
      <button class="icon-btn" id="export-btn" title="Export conversation">⬇️</button>
      <button class="icon-btn" id="explorer-btn" title="File explorer">📁</button>
      <button class="icon-btn" id="terminal-btn" title="Terminal">⚡</button>
      <button class="icon-btn" id="settings-btn" title="Settings">⚙️</button>
      <select id="global-model-select" title="Active model"></select>
      <div id="health-dot" class="health-dot" title="Server status"></div>
    </div>
  </header>

  <div id="chat-messages" class="chat-messages">
    <div id="chat-welcome" class="chat-welcome">
      <div class="welcome-icon">🤖</div>
      <h1>AI Agent</h1>
      <p>Ask anything · Upload an image · Attach a file</p>
      <div class="chip-row">
        <button class="chip" onclick="chipSend('List all Python files in the current directory')">📁 List files</button>
        <button class="chip" onclick="chipSend('Write a Hello World Python script and save it to /tmp/hello.py')">🐍 Python script</button>
        <button class="chip" onclick="chipSend('What tools and capabilities do you have?')">🛠️ Show tools</button>
        <button class="chip" onclick="chipSend('Summarize the project structure')">🔍 Analyze project</button>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <div id="attach-preview" class="attach-preview"></div>
    <div class="chat-input-box">
      <button id="attach-btn" class="icon-btn" title="Attach image or file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input type="file" id="attach-input" hidden accept="image/*,.pdf,.csv,.xlsx,.xls,.txt,.md,.py,.js,.json,.docx">
      <textarea id="unified-input" placeholder="Ask anything or attach a file…" rows="1"></textarea>
      <button id="unified-send-btn" class="send-btn" title="Send (Enter)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="chat-hints">
      <span>Enter to send · Shift+Enter for new line</span>
      <span id="unified-model-badge" class="model-badge"></span>
    </div>
  </div>

</div>

<!-- History panel -->
<div id="history-panel" class="history-panel hidden">
  <div class="history-header">
    <span>Previous chats</span>
    <button class="icon-btn" id="history-close-btn">✕</button>
  </div>
  <div id="history-list" class="history-list"></div>
</div>
<div id="history-overlay" class="history-overlay hidden"></div>

<!-- File explorer sidebar -->
<div id="explorer-panel" class="explorer-panel hidden">
  <div class="explorer-header">
    <span>📁 Files</span>
    <button class="icon-btn" id="explorer-close-btn">✕</button>
  </div>
  <div id="explorer-tree" class="explorer-tree">Loading…</div>
</div>
<div id="explorer-overlay" class="explorer-overlay hidden"></div>

<!-- Terminal panel -->
<div id="terminal-panel" class="terminal-panel hidden">
  <div class="terminal-header">
    <span>⚡ Terminal</span>
    <div style="display:flex;gap:6px">
      <button class="icon-btn" id="terminal-clear-btn" title="Clear">🗑</button>
      <button class="icon-btn" id="terminal-close-btn">✕</button>
    </div>
  </div>
  <div id="terminal-output" class="terminal-output"></div>
  <div class="terminal-input-row">
    <span class="terminal-prompt">$</span>
    <input id="terminal-input" class="terminal-input" placeholder="run a command…" autocomplete="off">
    <button class="icon-btn" id="terminal-run-btn">▶</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Settings modal -->
<div id="settings-overlay" class="settings-overlay hidden">
  <div class="settings-modal">
    <div class="settings-header">
      <span>⚙️ Settings</span>
      <button class="icon-btn" id="settings-close-btn">✕</button>
    </div>
    <div class="settings-body">

      <!-- Telegram -->
      <div class="settings-section">
        <div class="settings-section-title">
          <span>✈️ Telegram</span>
          <span id="tg-status-badge" class="settings-badge"></span>
        </div>
        <label class="settings-label">Bot Token</label>
        <input id="s-tg-token" class="settings-input" type="password" placeholder="123456789:AAH...">
        <label class="settings-label">Chat ID</label>
        <input id="s-tg-chat" class="settings-input" type="text" placeholder="123456789">
        <div class="settings-row">
          <button class="settings-btn-secondary" id="tg-test-btn">📨 Send test message</button>
          <span id="tg-test-result" style="font-size:12px;color:var(--muted)"></span>
        </div>
      </div>

      <!-- Anthropic -->
      <div class="settings-section">
        <div class="settings-section-title">
          <span>🤖 Claude / Anthropic</span>
          <span id="api-status-badge" class="settings-badge"></span>
        </div>
        <label class="settings-label">API Key</label>
        <input id="s-api-key" class="settings-input" type="password" placeholder="sk-ant-...">
        <label class="settings-label">Default Model</label>
        <select id="s-model" class="settings-input">
          <option value="claude-opus-4-7">Claude Opus 4.7</option>
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        </select>
      </div>

      <!-- Local Models -->
      <div class="settings-section">
        <div class="settings-section-title"><span>🖥️ Local Models (Ollama)</span></div>
        <label class="settings-label">Ollama URL</label>
        <input id="s-ollama-url" class="settings-input" type="text" placeholder="http://localhost:11434">
        <label class="settings-label">Default Local Model</label>
        <input id="s-local-model" class="settings-input" type="text" placeholder="llama3.2">
      </div>

      <!-- Agent -->
      <div class="settings-section">
        <div class="settings-section-title"><span>⚡ Agent</span></div>
        <label class="settings-label">Max Iterations</label>
        <input id="s-max-iter" class="settings-input" type="number" min="1" max="100">
        <label class="settings-label">Bash Timeout (seconds)</label>
        <input id="s-bash-timeout" class="settings-input" type="number" min="5" max="300">
      </div>

    </div>
    <div class="settings-footer">
      <button class="settings-btn-secondary" id="settings-cancel-btn">Cancel</button>
      <button class="settings-btn-primary" id="settings-save-btn">💾 Save Settings</button>
    </div>
  </div>
</div>

<!-- Command palette -->
<div id="cmd-overlay" class="cmd-overlay hidden">
  <div class="cmd-palette">
    <input id="cmd-input" class="cmd-input" placeholder="Type a command or action…" autocomplete="off">
    <div id="cmd-list" class="cmd-list"></div>
  </div>
</div>

<script src="/static/js/main.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</body>
</html>
